name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Forbidden tokens (no sorry / partial / unsafe / extern)
        run: |
          set -e
          ! grep -RInE '^\s*(sorry|partial def|unsafe def|@\[extern[^]]*\])\b' \
              --include='*.lean' \
              LeanCrypto LeanCryptoVCVio LeanCryptoProofs Tests
          echo "OK no forbidden tokens"

      - name: Core LeanCrypto stays Mathlib/VCVio-free
        run: |
          set -e
          ! grep -RInE '^\s*import\s+(Mathlib|VCVio)\b' \
              --include='*.lean' \
              LeanCrypto LeanCrypto.lean
          echo "OK no Mathlib/VCVio imports in core"

      - name: Resolve dependencies (lake update)
        run: |
          set -ex
          lake update 2>&1 | tee /tmp/lake-update.log | tail -40 || {
            echo "## lake update failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -200 /tmp/lake-update.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Build core (LeanCrypto + non-VCVio test exes)
        run: |
          set -ex
          TARGETS="LeanCrypto Tests.HelloTest Tests.BytesTest \
                   Tests.Sha256Test Tests.Sha512Test \
                   Tests.Fp25519Test Tests.ScalarLTest \
                   Tests.Edwards25519Test Tests.Ed25519Test \
                   Tests.WycheproofTest Tests.DiffCli"
          if ! lake build $TARGETS 2>&1 | tee /tmp/build-core.log; then
            {
              echo "## Build core failed (last 200 lines)"
              echo '```'
              tail -200 /tmp/build-core.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run core test executables
        run: |
          set -e
          shopt -s nullglob
          fail=0
          for exe in .lake/build/bin/*; do
            [ -x "$exe" ] && [ -f "$exe" ] || continue
            # Skip the request/response CLI — driven by the diff step below.
            # Skip Tests-VCVio-* — exercised in the vcvio-build job.
            case "$(basename "$exe")" in
              Tests-DiffCli) continue;;
              Tests-VCVio-*) continue;;
            esac
            echo "::group::$(basename "$exe")"
            if ! "$exe"; then
              echo "::error::$(basename "$exe") exited non-zero"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

      - name: Differential fuzz (Lean vs Python hashlib + Node ed25519)
        run: |
          set -ex
          if ! ./tests/diff/run.sh 2>&1 | tee /tmp/fuzz.log; then
            {
              echo "## Differential fuzz failed (last 200 lines)"
              echo '```'
              tail -200 /tmp/fuzz.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  vcvio-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake (vcvio variant — keyed independently from core)
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-vcvio-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lake-vcvio-${{ runner.os }}-

      - name: Resolve dependencies (lake update)
        run: |
          set -ex
          if ! lake update 2>&1 | tee /tmp/lake-update.log; then
            {
              echo "## lake update failed (last 200 lines)"
              echo '```'
              tail -200 /tmp/lake-update.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Fetch Mathlib precompiled olean cache
        run: |
          set -ex
          if ! lake exe cache get 2>&1 | tee /tmp/cache-get.log; then
            {
              echo "## lake exe cache get failed (last 200 lines)"
              echo '```'
              tail -200 /tmp/cache-get.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Fetch VCV-io submodules (ML-KEM / ML-DSA / Falcon native C)
        run: |
          set -ex
          # lake update has cloned VCVio into .lake/packages/VCVio; init its submodules.
          git -C .lake/packages/VCVio submodule update --init --depth 1

      - name: Build LeanCryptoVCVio + LeanCryptoProofs + Tests.VCVio.*
        run: |
          set -ex
          if ! lake build LeanCryptoVCVio 2>&1 | tee /tmp/build-vcvio.log; then
            {
              echo "## lake build LeanCryptoVCVio failed (last 300 lines)"
              echo '```'
              tail -300 /tmp/build-vcvio.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # Build the proofs library too — it depends on Mathlib so it belongs
          # in this job, not the core build job. Without this, regressions in
          # the linear_combination / native_decide proofs land silently.
          if ! lake build LeanCryptoProofs 2>&1 | tee /tmp/build-proofs.log; then
            {
              echo "## lake build LeanCryptoProofs failed (last 300 lines)"
              echo '```'
              tail -300 /tmp/build-proofs.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          for tgt in Tests.VCVio.Smoke Tests.VCVio.Hash \
                     Tests.VCVio.Ed25519Det Tests.VCVio.Ed25519ROM \
                     Tests.VCVio.GameSmoke; do
            if ! lake build "$tgt" 2>&1 | tee /tmp/build-$tgt.log; then
              {
                echo "## lake build $tgt failed (last 200 lines)"
                echo '```'
                tail -200 /tmp/build-$tgt.log
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done

      - name: Run Tests-VCVio-* executables
        run: |
          set -e
          shopt -s nullglob
          fail=0
          for exe in .lake/build/bin/Tests-VCVio-*; do
            [ -x "$exe" ] && [ -f "$exe" ] || continue
            echo "::group::$(basename "$exe")"
            if ! "$exe"; then
              echo "::error::$(basename "$exe") exited non-zero"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"
